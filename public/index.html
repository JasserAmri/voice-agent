<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Agent — QuickText</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header .status {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      background: #374151;
    }
    header .status.connected { background: #065f46; color: #6ee7b7; }
    header .status.error { background: #7f1d1d; color: #fca5a5; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #3b82f6;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1e293b;
      border: 1px solid #334155;
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center;
      background: transparent;
      color: #64748b;
      font-size: 13px;
      font-style: italic;
    }

    #controls {
      padding: 16px 24px;
      background: #1e293b;
      border-top: 1px solid #334155;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    #textInput {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 15px;
      outline: none;
    }
    #textInput:focus { border-color: #3b82f6; }
    #textInput::placeholder { color: #64748b; }

    button {
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    #micBtn {
      background: #3b82f6;
      color: white;
      min-width: 120px;
    }
    #micBtn:hover { background: #2563eb; }
    #micBtn.listening {
      background: #ef4444;
      animation: pulse 1.5s infinite;
    }
    #micBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    #sendBtn {
      background: #334155;
      color: #e2e8f0;
    }
    #sendBtn:hover { background: #475569; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
    }

    .thinking {
      display: inline-flex;
      gap: 4px;
      padding: 12px 16px;
    }
    .thinking span {
      width: 8px; height: 8px;
      background: #64748b;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <header>
    <h1>Voice Agent</h1>
    <span id="statusBadge" class="status">Initializing...</span>
  </header>

  <div id="chat"></div>

  <div id="controls">
    <input id="textInput" type="text" placeholder="Type a message or use the mic..." autocomplete="off" />
    <button id="sendBtn">Send</button>
    <button id="micBtn" disabled>Mic</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
